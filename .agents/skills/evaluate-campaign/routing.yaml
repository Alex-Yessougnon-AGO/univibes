# Routing + capability metadata for evaluate-campaign.
# Source of truth — compiled into:
#   - hooks/skill-registry.json by `node hooks/build-registry.mjs`
#   - references/capability-index.json by `bun scripts/build-capability-index.ts`
# NOT loaded into model context. Edit here, then rebuild both.
promptSignals:
  phrases:
    - "campaign eval"
    - "evaluate campaign performance"
    - "evaluate the campaign"
    - "campaign results"
    - "did the campaign work"
    - "score this campaign"
    - "campaign cycle results"
    - "channel breakdown"
    - "campaign CAC"
    - "campaign retrospective"
    - "post-launch campaign review"
    - "did the launch land"
  allOf:
    - [campaign, results]
    - [campaign, performance]
    - [channel, breakdown]
    - [campaign, not, working]
  anyOf:
    - "cost per acquisition"
    - "CAC"
    - "channel mix"
    - "leads generated"
    - "campaign revenue"
    - "campaign ROI"
    - "blended CAC"
    - "did the campaign land"
  noneOf:
    - "new campaign plan"
    - "plan a campaign"
    - "campaign brief"
    - "single ad performance"
    - "one post results"
  minScore: 6

capability:
  id: evaluate-campaign
  domain: marketing
  public: true
  command: /evaluate-campaign
  summary: "Score a launched multi-channel campaign from real metrics inside an existing eval loop — verdict, per-channel breakdown, unit economics. Aggregate-only, one cycle = whole campaign."
  aliases:
    - campaign-eval
    - retro
    - post-launch-review

  route:
    use_when:
      - "User asks to evaluate a launched campaign cycle (post-launch review with metrics)."
      - "Loop exists; cycle N needs to be scored against the source plan-campaign hypothesis."
    not_when:
      - "Loop does not exist yet -> run-pipeline."
      - "User wants to plan or re-plan the campaign -> plan-campaign."
      - "Single ad performance -> evaluate-ad."
      - "Single organic post performance -> evaluate-content."
      - "Single landing page performance -> evaluate-landing-page."
      - "Single short-form video performance -> evaluate-shortform."
    prerequisites:
      recommended:
        - "id:brand"
        - "id:icp-research"
        - "id:product-context"
      hard:
        - ".forsvn/loops/[slug]/program.md"
        - ".forsvn/loops/[slug]/context.md"
        - "docs/forsvn/artifacts/marketing/campaign-plan.md"

  orchestration:
    default: auto
    single_when:
      - "Metric ingest only (no channel-mix diagnosis needed)."
    multi_when:
      - "Default — 4 agents (Metric Ingest + Diagnosis + Recommendation + Critic)."
      - "Channel-mix or unit-economics signal disputed; needs the full layer."
    critic_required_when:
      - "Always — eval artifact + ledger row are canonical loop state."
      - "Override protocol: critic FAIL twice -> BLOCKED, no ledger row."

  load:
    always:
      - "references/_shared/eval-loop-spec.md"
      - "references/_shared/evaluation-loop-rubric.md"
    when:
      - if: "Pre-Dispatch (Warm / Cold Start, hard-block checks)"
        read:
          - "references/procedures/pre-dispatch.md"
      - if: "Layer dispatch + critic revision cycle"
        read:
          - "references/agent-manifest.md"
          - "references/procedures/dispatch-mechanics.md"
      - if: "Rubric scoring"
        read:
          - "references/rubric.md"
      - if: "Artifact write / Evidence + Channel-Mix table format"
        read:
          - "references/format-conventions.md"
      - if: "Critic override (operator ships despite FAIL)"
        read:
          - "references/_shared/critic-override-protocol.md"
      - if: "Quality feedback / dashboard updates"
        read:
          - "references/_shared/quality-dashboard-spec.md"
      - if: "Anti-pattern review"
        read:
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: ".forsvn/loops/[slug]/evals/YYYY-MM-DD-cycle-N.md"
        lifecycle: evaluation
        produced_when: "Critic PASS; one cycle ends with one artifact + one ledger row."
      - path: ".forsvn/loops/[slug]/results.tsv"
        lifecycle: evaluation
        produced_when: "One row appended via `append-loop-result.ts` on critic PASS."
      - path: ".forsvn/loops/[slug]/learnings.md"
        lifecycle: evaluation
        produced_when: "ONLY for high-confidence keep/discard lessons that generalize beyond this campaign — critic gates promotion."
