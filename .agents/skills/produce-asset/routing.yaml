# Routing + capability metadata for produce-asset.
promptSignals:
  phrases:
    - "produce asset"
    - "render asset"
    - "generate image"
    - "asset from brief"
    - "make the asset"
    - "build the asset"
    - "render-ready prompt"
    - "image-gen prompt"
    - "asset manifest"
  allOf:
    - [produce, asset]
    - [render, brief]
    - [generate, image, brief]
  anyOf:
    - "produce-asset"
    - "asset render"
    - "Midjourney prompt"
    - "DALL-E prompt"
    - "Imagen prompt"
    - "image generation prompt"
  # noneOf must target intent ("write the brief", "publish it"), not bare nouns.
  # The old `"design brief"` / `"graphic brief"` entries self-suppressed any
  # legitimate "produce asset from this design brief" request — the natural
  # phrasing for the skill's primary use case. Same for bare `"publish"`,
  # which fired on routine words.
  noneOf:
    - "write a design brief"
    - "draft a design brief"
    - "create a design brief"
    - "write a graphic brief"
    - "draft a graphic brief"
    - "write a brief for"
    - "design system"
    - "publish to social"
    - "publish to the"
    - "publish this asset"
  minScore: 6

capability:
  id: produce-asset
  domain: marketing
  public: true
  command: /produce-asset
  summary: "Turn brief-graphic into render-ready prompts + asset manifest. Tool-agnostic — emits prompts tuned for chosen image engine (Midjourney / DALL·E / Imagen / Figma / designer)."
  aliases:
    - asset-produce
    - image-prompt
    - render-prompt

  route:
    use_when:
      - "Design brief exists and you need production-ready prompts."
      - "Asset manifest emission for downstream rendering."
      - "Multi-platform asset variants from a single brief."
    not_when:
      - "Copy that goes in the asset -> write-copy."
      - "The brief itself -> brief-graphic."
      - "Publishing the rendered asset -> publish-social."
      - "Rendering happens upstream / inside an image engine — not in this stack."
    prerequisites:
      recommended:
        - "id:design"
        - "id:brand"
      hard:
        - "docs/forsvn/artifacts/marketing/design-briefs/[slug].md"

  orchestration:
    default: auto
    single_when:
      - "Single platform; --fast collapses to single-pass."
    multi_when:
      - "Multi-platform variants; per-platform prompt + manifest emission."
    critic_required_when:
      - "Always — tool-agnostic export-mode floor (no API keys / no rendering)."
      - "Brand-mark fidelity gate (no hallucinated logos / tokens)."

  load:
    always:
      - "references/_shared/before-starting-check.md"
      - "references/_shared/production-pattern.md"
    when:
      - if: "Asset format / per-engine emission rules"
        read:
          - "references/format-conventions.md"
      - if: "Anti-pattern review"
        read:
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: "docs/forsvn/artifacts/marketing/produced-assets/[slug]/manifest.md"
        lifecycle: pipeline
        produced_when: "Critic PASS; canonical asset manifest."
      - path: "docs/forsvn/artifacts/marketing/produced-assets/[slug]/prompts/[platform].md"
        lifecycle: pipeline
        produced_when: "Per-platform prompt file (one per target engine)."
