# Routing + capability metadata for research-market.
# Source of truth — compiled into:
#   - hooks/skill-registry.json by `node hooks/build-registry.mjs`
#   - references/capability-index.json by `bun scripts/build-capability-index.ts`
# NOT loaded into model context. Edit here, then rebuild both.
promptSignals:
  phrases:
    - "market research"
    - "competitive analysis"
    - "market size"
    - "tam sam som"
    - "competitor analysis"
    - "market landscape"
  allOf:
    - [market, landscape]
    - [competitive, dynamics]
  anyOf:
    - "competitor"
    - "market"
    - "whitespace"
    - "sizing"
    - "tam"
  noneOf:
    - "customer persona"
    - "buyer persona"
  minScore: 6

capability:
  id: research-market
  domain: research
  public: true
  command: /research-market
  summary: "Map market landscape, competitors, TAM/SAM/SOM sizing, whitespace opportunities — every claim sourced, adjacent competitors checked, sizing shown with methodology."
  aliases:
    - market-research
    - competitive-analysis
    - market-sizing
    - whitespace

  route:
    use_when:
      - "User asks to position a product, survey a competitive field, or scope a new market."
      - "Fundraising market section needed."
      - "Strategy track entry point (`parallel-with` /diagnose)."
    not_when:
      - "Building customer personas / VoC -> research-icp."
      - "Planning marketing campaigns -> plan-campaign."
      - "Diagnosing a specific business problem -> diagnose."
      - "Prioritizing what to build from market data -> prioritize."
    prerequisites:
      recommended:
        - "id:product-context"
        - "id:diagnose"
      hard: []

  orchestration:
    default: auto
    single_when:
      - "Quick validation only (Route A); single-pass critic."
      - "--fast forces Route A (skips sizing + opportunity)."
    multi_when:
      - "Route B (product positioning, default) — 7 agents across L1 parallel + L2 sequential."
      - "Route C (fundraising / market entry) — all 4 L1 agents at enhanced depth + sizing REQUIRED."
      - "--deep forces Route C."
    critic_required_when:
      - "Always — 11-item rubric + adjacent-competitor floor + sizing methodology check."
      - "TAM/SAM/SOM without methodology auto-FAIL."

  load:
    always:
      - "references/_shared/before-starting-check.md"
      - "references/_shared/pre-dispatch-protocol.md"
      - "references/_shared/mode-resolver.md"
    when:
      - if: "Pre-Dispatch (Warm / Cold Start, Q1-Q5)"
        read:
          - "references/procedures/pre-dispatch.md"
      - if: "Layer dispatch + critic revision cycle"
        read:
          - "references/agent-manifest.md"
          - "references/procedures/dispatch-mechanics.md"
      - if: "Competitor analysis methodology"
        read:
          - "references/competitor-analysis-framework.md"
      - if: "Market sizing (TAM/SAM/SOM)"
        read:
          - "references/market-sizing-guide.md"
      - if: "Gap analysis / opportunity identification"
        read:
          - "references/gap-analysis-template.md"
      - if: "Confidence labeling on findings"
        read:
          - "references/_shared/confidence-labeling.md"
      - if: "Artifact write / Scope Calibration"
        read:
          - "references/format-conventions.md"
      - if: "Anti-pattern review"
        read:
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: "docs/forsvn/canonical/research/MARKET.md"
        id: market-research
        lifecycle: canonical
        produced_when: "Critic PASS; on re-run overwrite `docs/forsvn/canonical/research/MARKET.md` in place and increment the integer version (no `.v[N].md` sibling under canonical/)."
