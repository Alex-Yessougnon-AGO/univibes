# Routing + capability metadata for preview-og.
# Source of truth — compiled into:
#   - hooks/skill-registry.json by `node hooks/build-registry.mjs`
#   - references/capability-index.json by `bun bin/build-capability-index.ts`
# NOT loaded into model context. Edit here, then rebuild both.
promptSignals:
  phrases:
    - "og image"
    - "og:image"
    - "open graph"
    - "opengraph"
    - "share card"
    - "social card"
    - "link preview"
    - "social preview"
    - "twitter card"
    - "preview broken"
    - "thumbnail not showing"
    - "card not showing"
    - "how does my link look"
    - "test my og"
    - "check my og"
    - "metaprev"
  allOf:
    - [og, image]
    - [share, card]
    - [link, preview]
    - [social, preview]
  anyOf:
    - "opengraph"
    - "og:image"
    - "twitter:card"
    - "link preview"
    - "share card"
    - "social card"
    - "metaprev"
  # noneOf targets intent, not bare nouns, to avoid substring collisions with
  # neighboring marketing skills (produce-asset makes the art; write-copy writes
  # the text; optimize-seo owns search strategy).
  noneOf:
    - "keyword research"
    - "seo strategy"
    - "write the copy"
    - "design system"
  minScore: 6

capability:
  id: preview-og
  domain: marketing
  public: true
  command: /preview-og
  summary: "Preview, validate, and fix Open Graph / Twitter share cards (how a link renders on Facebook, X, LinkedIn, Discord/Slack) via the metaprev CLI, then re-verify the fix."
  aliases:
    - og-preview
    - check-og
    - share-card

  route:
    use_when:
      - "User asks how a link renders when shared, or says a share / link preview is broken or blank."
      - "User added or changed og:* / twitter:* meta or an og:image and wants it verified."
      - "A page is being readied to ship and share-card health should be checked first."
    not_when:
      - "Writing the page copy -> write-copy."
      - "Search / answer-engine strategy -> optimize-seo."
      - "Generating the og:image artwork -> produce-asset."
      - "Posting the content to social -> publish-social."
    prerequisites:
      recommended: []
      hard: []

  orchestration:
    default: auto
    single_when:
      - "Always — one URL: run metaprev, triage, apply fixes, re-verify. No sub-agents."
    multi_when:
      - "Never — deterministic tool wrapper; the CLI is the analysis engine."
    critic_required_when:
      - "Always — the critic IS the metaprev re-run (objective), not an LLM rubric. A fix is accepted only when the tool reports the issue cleared."

  load:
    always:
      - "references/_shared/before-starting-check.md"
      - "references/playbook.md"
    when:
      - if: "Applying fixes in the codebase"
        read:
          - "references/fixes.md"
      - if: "Writing the artifact"
        read:
          - "references/format-conventions.md"
      - if: "Reviewing for anti-patterns"
        read:
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: "docs/forsvn/artifacts/marketing/preview-og-[date]-[slug].md"
        lifecycle: snapshot
        produced_when: "A preview / fix pass completes (DONE or DONE_WITH_CONCERNS)."
