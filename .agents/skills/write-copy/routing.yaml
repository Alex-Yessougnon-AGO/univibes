# Routing + capability metadata for write-copy.
# Source of truth — compiled into:
#   - hooks/skill-registry.json by `node hooks/build-registry.mjs`
#   - references/capability-index.json by `bun scripts/build-capability-index.ts`
# NOT loaded into model context. Edit here, then rebuild both.
promptSignals:
  phrases:
    - "write copy"
    - "headline"
    - "tagline"
    - "call to action"
    - "write a headline"
    - "hook line"
    - "write a cta"
  allOf:
    - [write, copy]
    - [craft, headline]
  anyOf:
    - "headline"
    - "cta"
    - "tagline"
    - "hook"
    - "persuasive"
    - "ad copy"
    - "long-form copy"
  noneOf:
    - "social media post"
    - "blog post"
    - "email campaign"
    - "carousel"
  minScore: 6

capability:
  id: write-copy
  domain: marketing
  public: true
  command: /write-copy
  summary: "Draft and critique persuasive copy for headlines, hooks, CTAs, taglines, and landing-page sections."
  aliases:
    - copy
    - headline
    - hook
    - cta

  route:
    use_when:
      - "User asks for headline, hook, CTA, tagline, or section copy."
      - "User asks to critique persuasive copy with alternatives."
      - "Landing-page, direct-response, or conversion copy needs V/F/U scoring."
    not_when:
      - "Social platform posts -> write-social."
      - "Paid ad copy -> write-ad."
      - "AI-sounding cleanup or final human polish -> humanmaxxing."
      - "Landing-page structure or wire brief -> brief-landing-page."
    prerequisites:
      recommended:
        - "id:product-context"
        - "id:icp-research"
        - "id:brand"
      hard: []

  orchestration:
    default: auto
    single_when:
      - "Single key line such as one headline, CTA, tagline, subject line, or hook."
      - "Audience, proof, offer, and voice are already known."
      - "User asks for a quick draft or critique."
    multi_when:
      - "Full page, campaign surface, or multiple section copy."
      - "The one shift, proof, belief sequence, or Unique Mechanism is unresolved."
      - "Output is external-facing and likely to be reused."
    critic_required_when:
      - "External-facing copy."
      - "Any artifact written under docs/forsvn/artifacts."
      - "User asks for critique, review, scoring, or alternatives."

  load:
    always:
      - "references/procedures/pre-dispatch.md"
      - "references/format-conventions.md"
    when:
      - if: "headline, hook, tagline, or subject line"
        read:
          - "references/headline-formulas.md"
      - if: "full page or landing section copy"
        read:
          - "references/page-sections.md"
          - "references/procedures/dispatch-mechanics.md"
      - if: "psychology or persuasion depth matters"
        read:
          - "references/emotional-triggers.md"
          - "references/belief-disruption.md"
      - if: "high-stakes, seven-sweeps, or expert-panel requested"
        read:
          - "references/seven-sweeps.md"
      - if: "quality gate or failure review"
        read:
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: "docs/forsvn/artifacts/marketing/content/[slug].copy.md"
        lifecycle: pipeline
        produced_when: "Route A or Route B writes standalone copy."
