# Routing + capability metadata for brief-app-preview.
# Source of truth — compiled into:
#   - hooks/skill-registry.json by `node hooks/build-registry.mjs`
#   - references/capability-index.json by `bun scripts/build-capability-index.ts`
# NOT loaded into model context. Edit here, then rebuild both.
promptSignals:
  phrases:
    - "app preview brief"
    - "app store preview"
    - "onboarding video brief"
    - "feature demo brief"
    - "ui preview video"
    - "product demo video"
    - "app onboarding"
    - "screen recording brief"
    - "interaction storyboard"
    - "ui motion brief"
  allOf:
    # [app, store, preview] removed — fired on "publish the app preview to the
    # store" because the three words appeared in any order. The phrase
    # "app store preview" already covers the intended App-Store-screenshot
    # intent at +6.
    - [app, preview]
    - [feature, demo]
    - [onboarding, video]
    - [ui, motion]
    - [screenshot, brief]
  anyOf:
    - "app preview"
    - "feature demo"
    - "onboarding"
    - "product demo"
    - "ui beat"
    - "screen recording"
    - "screenshot"
    - "interaction beat"
  noneOf:
    - "tiktok"
    - "reels"
    - "shorts"
    - "social video"
    - "short-form"
    - "hook variations"
    # Bare `"publish"` / `"render"` removed — they fired on routine words in
    # otherwise-legitimate brief prompts. Verb-anchored suppressors below
    # target the actual deflect-to-publish-social / produce-asset / produce-
    # video intents. With allOf [app, store, preview] also removed, the
    # remaining threshold suffices for the typical "publish the app preview
    # to the store" / "render the app preview video from this brief" cases.
    - "publish to social"
    - "publish to instagram"
    - "publish to linkedin"
    - "publish to x"
    - "publish to tiktok"
    - "render the asset"
    - "render asset"
    - "image generation"
    - "evaluate"
  minScore: 6

capability:
  id: brief-app-preview
  domain: marketing
  public: true
  command: /brief-app-preview
  summary: "Production-ready brief for app onboarding / App Store preview / feature-demo video — UI beats from screenshots, interaction choreography, motion rules, produce-video handoff."
  aliases:
    - app-preview-brief
    - feature-demo-brief
    - onboarding-video-brief

  route:
    use_when:
      - "Screenshots exist and goal is to show a product feature in action."
      - "App Store preview / onboarding video / feature-demo brief needed."
      - "Composition over real UI screenshots (no synthesis)."
    not_when:
      - "Generic short-form social video -> brief-shortform."
      - "Rendering the video -> produce-video."
      - "Static visual asset -> brief-graphic."
      - "No screenshots available; greenfield social video -> brief-shortform."
    prerequisites:
      recommended:
        - "id:brand"
        - "id:design"
        - "id:icp-research"
      hard: []

  orchestration:
    default: multi
    single_when:
      - "--fast collapses to leaner single-pass; safety gates still fire."
    multi_when:
      - "Default — multi-agent (feature-anchor + crop-map + caption-band + interaction-choreography + critic) with 6 hard gates."
    critic_required_when:
      - "Always — 6 hard gates (screenshot grounding, interaction vocabulary, mask transforms, pointer fidelity, caption-band geometry, brand-source declaration)."

  load:
    always:
      - "references/_shared/before-starting-check.md"
      - "references/_shared/pre-dispatch-protocol.md"
    when:
      - if: "Pre-Dispatch (Warm / Cold Start, screenshot inventory)"
        read:
          - "references/procedures/pre-dispatch.md"
      - if: "Layer dispatch + critic routing"
        read:
          - "references/procedures/dispatch-mechanics.md"

  outputs:
    artifacts:
      - path: "docs/forsvn/artifacts/marketing/app-preview-brief/[slug]/brief.md"
        lifecycle: pipeline
        produced_when: "Critic PASS; main artifact."
      - path: "docs/forsvn/artifacts/marketing/app-preview-brief/[slug]/handoff-produce-video.md"
        lifecycle: pipeline
        produced_when: "Always emitted — per-shot spec for produce-video."
      - path: "docs/forsvn/artifacts/marketing/app-preview-brief/[slug]/assets.md"
        lifecycle: pipeline
        produced_when: "Always emitted — source-ID-to-path map."
      - path: "docs/forsvn/artifacts/marketing/app-preview-brief/[slug]/crop-map.md"
        lifecycle: pipeline
        produced_when: "Always emitted — crop justifications."
