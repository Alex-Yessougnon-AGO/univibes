# Routing + capability metadata for publish-social.
# Source of truth — compiled into:
#   - hooks/skill-registry.json by `node hooks/build-registry.mjs`
#   - references/capability-index.json by `bun scripts/build-capability-index.ts`
# NOT loaded into model context. Edit here, then rebuild both.
promptSignals:
  phrases:
    - "publish social"
    - "publish to social"
    - "schedule social"
    - "post to platform"
    - "draft tweets"
    - "draft a thread"
    - "schedule post"
    - "publish-ready"
    - "scheduler import"
    - "Typefully draft"
    - "Buffer import"
    - "Hootsuite import"
    - "post on X"
    - "post on LinkedIn"
    - "post on Instagram"
  allOf:
    - [publish, social]
    - [schedule, post]
    - [draft, tweet]
    - [scheduler, import]
  anyOf:
    - "publish-social"
    - "social publish"
    - "Typefully"
    - "Buffer"
    - "Hootsuite"
    - "schedule on"
    - "draft on"
  # noneOf entries must target intent, not bare nouns. The old `"ad copy"`
  # entry fired on `"thread copy"` via substring (thre-AD-COPy contains "ad
  # copy"), suppressing legit publish prompts. Use verb-anchored alternatives.
  noneOf:
    - "design system"
    - "landing page"
    - "write ad copy"
    - "write the ad copy"
    - "draft ad copy"
    - "image generation"
  minScore: 6

capability:
  id: publish-social
  domain: marketing
  public: true
  command: /publish-social
  summary: "Turn write-social copy into a publishing bundle — per-platform drafts, scheduler imports (Typefully/Buffer/Hootsuite/CSV), or live posting behind a two-stage gate."
  aliases:
    - publish
    - schedule-social
    - social-publish

  route:
    use_when:
      - "User asks to schedule, draft, or publish finished social copy."
      - "User needs scheduler-import files (Typefully / Buffer / Hootsuite / generic CSV)."
      - "User invokes `--mode=publish` to post live (two-stage gate fires)."
    not_when:
      - "Writing the copy itself -> write-social."
      - "Image / carousel media generation -> produce-asset."
      - "Video media generation -> produce-video."
      - "Landing-page placement -> brief-landing-page."
    prerequisites:
      recommended:
        - "docs/forsvn/artifacts/marketing/produce-asset/[slug]/manifest.md"
        - "docs/forsvn/artifacts/marketing/produce-video/[slug]/manifest.md"
      hard:
        - "docs/forsvn/artifacts/marketing/write-social/[slug]/*.md"
        - "id:brand"

  orchestration:
    default: auto
    single_when:
      - "Route A — export-only (no credentials detected). Single formatter pass."
      - "Single platform draft refresh."
    multi_when:
      - "Route C — browser-automation drafts across 8 non-X platforms (sequential, 3s pacing)."
      - "Route D — `--mode=publish` across multiple platforms (formatter → critic → two-stage gate → automation → orchestrator dim 8)."
    critic_required_when:
      - "Always — 8-dim rubric runs before delivery (export/draft) or before the publish gate fires (publish)."
      - "Any bundle emission writes a canonical artifact under docs/forsvn/artifacts/marketing/published-social/."

  load:
    always:
      - "references/_shared/before-starting-check.md"
      - "references/format-conventions.md"
    when:
      - if: "Pre-Dispatch (target-platform resolution, credentials probe)"
        read:
          - "references/procedures/pre-dispatch.md"
          - "references/platform-credentials.md"
      - if: "Per-platform formatting"
        read:
          - "references/scheduler-formats.md"
          - "references/platforms/"
      - if: "Route C browser-automation draft"
        read:
          - "references/confirmation-gate.md"
          - "references/automation-flows/"
          - "references/session-cookie-export.md"
      - if: "Route D `--mode=publish`"
        read:
          - "references/publish-confirmation-gate.md"
      - if: "Critic / 8-dim rubric"
        read:
          - "references/rubric.md"
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: "docs/forsvn/artifacts/marketing/published-social/[slug]/manifest.md"
        lifecycle: pipeline
        produced_when: "Bundle ships (DONE or DONE_WITH_CONCERNS)."
      - path: "docs/forsvn/artifacts/marketing/published-social/[slug]/platforms/[platform].md"
        lifecycle: pipeline
        produced_when: "One file per target platform — body, hashtags, CTA, media ref, formatting."
      - path: "docs/forsvn/artifacts/marketing/published-social/[slug]/scheduler-imports/typefully.json"
        lifecycle: pipeline
        produced_when: "Always emitted in export/draft bundle."
      - path: "docs/forsvn/artifacts/marketing/published-social/[slug]/scheduler-imports/buffer.csv"
        lifecycle: pipeline
        produced_when: "Always emitted in export/draft bundle."
      - path: "docs/forsvn/artifacts/marketing/published-social/[slug]/scheduler-imports/hootsuite.csv"
        lifecycle: pipeline
        produced_when: "Always emitted in export/draft bundle."
      - path: "docs/forsvn/artifacts/marketing/published-social/[slug]/scheduler-imports/generic.csv"
        lifecycle: pipeline
        produced_when: "Always emitted in export/draft bundle."
      - path: "docs/forsvn/artifacts/marketing/published-social/[slug]/README.md"
        lifecycle: pipeline
        produced_when: "Always emitted — operator step-by-step per route."
