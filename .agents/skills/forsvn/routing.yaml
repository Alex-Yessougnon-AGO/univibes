# Routing + capability metadata for forsvn.
# Source of truth — compiled into:
#   - hooks/skill-registry.json by `node hooks/build-registry.mjs`
#   - references/capability-index.json by `bun scripts/build-capability-index.ts`
# NOT loaded into model context. Edit here, then rebuild both.
promptSignals:
  # Bare `"continue"` and `"resume"` used to be phrases here, scoring +6 on
  # any sentence containing them ("we should resume work after lunch", "let's
  # continue this discussion"). Replaced with context-anchored variants that
  # require an explicit work / session / initiative anchor. minScore raised
  # from 3 (which was functionally inert — no allOf groups, anyOf capped at
  # +2 — phrases auto-fire at +6) to the standard 6.
  phrases:
    - "where do i start"
    - "what should i do"
    - "which skill should i use"
    - "what skill should i use"
    - "i don't know"
    - "help me"
    - "pick up where i left off"
    - "pick this back up"
    - "what was i working on"
    - "resume the work"
    - "resume work"
    - "resume working on"
    - "resume the initiative"
    - "resume the project"
    - "resume my session"
    - "resume my work"
    - "let's resume"
    - "let me resume"
    - "continue working on"
    - "continue the work"
    - "continue this session"
    - "let's continue"
    - "let me continue"
    - "launch this"
    - "ship this"
    - "/forsvn"
  anyOf:
    - "where do i start"
    - "which skill"
    - "what skill"
    - "guide me"
    - "i'm new"
    - "help me launch"
    - "help me ship"
    - "what should i do next"
  minScore: 6

capability:
  id: forsvn
  domain: meta
  public: true
  command: /forsvn
  summary: "Front door that classifies vague work, reads project state, and routes to the right FORSVN capability."
  aliases:
    - front-door
    - route
    - resume
    - launch

  route:
    use_when:
      - "User does not know which FORSVN skill to invoke."
      - "User asks to resume, continue, launch, ship, or decide where to start."
      - "Request is vague, multi-domain, or needs a short next-action chain."
    not_when:
      - "User already named the exact direct skill to invoke."
      - "User wants a deep multi-perspective argument -> debate-agents."
      - "User wants a full scoping interview -> discover."
    prerequisites:
      recommended:
        - "docs/forsvn/canonical/product/PRODUCT-CONTEXT.md"
      hard: []

  orchestration:
    default: single
    single_when:
      - "Classifying one user request or summarizing current project state."
      - "Resuming a known prior session."
    multi_when:
      - "Never dispatches multi-agent itself; it proposes a chain of downstream capabilities."
    critic_required_when:
      - "Routing changes would write or rewrite canonical project state."
      - "The proposed chain would affect brand, architecture, revenue, security, or data."

  load:
    always:
      - "references/chains/research.md"
      - "references/chains/marketing.md"
      - "references/chains/product.md"
      - "references/chains/meta.md"
    when:
      - if: "workspace has no .forsvn state"
        read:
          - "templates/README.md"

  outputs:
    artifacts:
      - path: ".forsvn/routing/last-session.md"
        lifecycle: anchor
        produced_when: "Every routed or awaiting-user invocation."
      - path: ".forsvn/routing/history/YYYY-MM-DD-HHMMSS-[intent].md"
        lifecycle: snapshot
        produced_when: "Every routed or awaiting-user invocation."
