# Routing + capability metadata for prioritize.
promptSignals:
  # `"what should we build next"` removed — it's a superstring of discover's
  # `"what should we build"`, so both phrases tied at +6 on any prompt with
  # "what should we build next". prioritize now requires explicit ranking
  # intent (`"what to build first"`, `"rank the options"`, `"ice score"`,
  # etc.). Bare anyOf `"solution"` also removed — too broad; `"which solution"`
  # phrase covers the strong case.
  phrases:
    - "what to build first"
    - "which to build first"
    - "prioritize initiatives"
    - "prioritize the options"
    - "prioritize these options"
    - "prioritize the list"
    - "ice score"
    - "which solution"
    - "strategic options"
    - "rank the options"
    # U13 ideation entry mode — explicit generate-AND-rank intent only. Bare
    # "brainstorm" / "generate ideas" stays with discover; these phrases all
    # carry the ranking verb so they don't collide with discover's triggers.
    - "generate ideas and rank"
    - "rank these ideas"
    - "score the ideas"
  allOf:
    - [what, build, prioritize]
    - [solution, prioritize]
    - [initiative, rank]
  anyOf:
    - "prioritize"
    - "ice"
    - "initiative"
    - "trade-off"
  noneOf:
    - "market research"
    - "buyer persona"
  minScore: 6

capability:
  id: prioritize
  domain: research
  public: true
  command: /prioritize
  summary: "Brainstorm strategic solutions when the problem is known — generate initiatives, force-rank with ICE, surface trade-offs with evidence, draw a cut line with kill criteria."
  aliases:
    - ice-prioritize
    - rank-initiatives
    - strategic-options

  route:
    use_when:
      - "Problem or goal is already clear; need to decide what to build first."
      - "Force-ranked initiatives with ICE (Impact × Confidence × Effort)."
      - "Strategic options need a cut line + kill criteria."
      - "A candidate set (discover shortlist, debate output, 'generate ideas and rank them') needs a scored ranking — ideation mode."
    not_when:
      - "Diagnosing the problem itself -> diagnose."
      - "Engineering task list from a known initiative -> breakdown-tasks."
      - "Numeric funnel targets -> plan-funnel."
      - "Technical architecture for a chosen initiative -> architect-system."
    prerequisites:
      recommended:
        - "id:market-research"
        - "id:product-context"
      # Mode-conditional hard gate (U13): id:diagnose is HARD in the default
      # root-cause mode (SKILL.md Critical Gates + procedures/pre-dispatch.md);
      # in ideation mode (candidate-set input) it is replaced by a stated
      # ranking anchor captured at Pre-Dispatch.
      hard:
        - "id:diagnose"

  orchestration:
    default: auto
    single_when:
      - "Small option set (<5 initiatives); --fast forces single-pass."
    multi_when:
      - "Larger option set with cross-domain dependencies; ICE scoring + trade-off matrix."
    critic_required_when:
      - "Always — evidence-backed ICE (no opinion-only scores)."
      - "Cut line + kill criteria explicit per ranked initiative."

  load:
    always:
      - "references/_shared/before-starting-check.md"
    when:
      - if: "Pre-Dispatch"
        read:
          - "references/_shared/pre-dispatch-protocol.md"
      - if: "ICE scoring rubric + initiative planning"
        read:
          - "references/ice-scoring-rubric.md"
          - "references/initiative-planning.md"
          - "references/initiative-types.md"
      - if: "Anti-pattern review (vanity-impact, sunk-cost-confidence)"
        read:
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: "docs/forsvn/artifacts/meta/sketches/prioritize-<slug>.md"
        lifecycle: pipeline
        produced_when: "Critic PASS; ranked-initiative sketch + cut line + kill criteria."
