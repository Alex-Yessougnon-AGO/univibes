# Routing + capability metadata for evaluate-asset.
# Source of truth — compiled into:
#   - hooks/skill-registry.json by `node hooks/build-registry.mjs`
#   - references/capability-index.json by `bun scripts/build-capability-index.ts`
# NOT loaded into model context. Edit here, then rebuild both.
promptSignals:
  phrases:
    - "asset eval"
    - "evaluate the asset"
    - "evaluate the render"
    - "did the render match the brief"
    - "did the image match the brief"
    - "render quality check"
    - "score the render"
    - "brief fidelity"
    - "did the generated image work"
    - "rate the produced asset"
    - "is the asset on brand"
    - "render vs brief"
  allOf:
    - [render, brief]
    - [asset, fidelity]
    - [image, match, brief]
    - [render, quality]
  anyOf:
    - "brief fidelity"
    - "render quality"
    - "on brand"
    - "off brand"
    - "aspect ratio"
    - "legible"
    - "render artifacts"
    - "picked variant"
  noneOf:
    - "generate an image"
    - "produce the asset"
    - "create a graphic"
    - "design brief"
    - "post performance"
    - "engagement rate"
    - "short-form video"
  minScore: 6

capability:
  id: evaluate-asset
  domain: marketing
  public: true
  command: /evaluate-asset
  summary: "Score a produced visual asset (image / graphic / carousel frame) against its brief — render fidelity + brand-fit — inside an existing eval loop, using the re-ingested asset (the return-leg). One asset (or picked variant) per cycle, verdict + brief-fidelity diagnosis."
  aliases:
    - asset-eval
    - render-eval
    - brief-fidelity-eval

  route:
    use_when:
      - "User asks to evaluate a rendered/produced visual asset against its brief-graphic acceptance criteria."
      - "Loop exists; the rendered asset is re-ingested (return-leg) and cycle N needs scoring for that one asset/variant."
    not_when:
      - "Loop does not exist yet -> run-pipeline."
      - "Only a prompt/brief exists; nothing rendered or re-ingested -> produce-asset + re-ingest."
      - "The asset is a short-form video -> evaluate-shortform."
      - "The surface is a landing page -> evaluate-landing-page."
      - "The question is the asset's live-post engagement -> evaluate-content / evaluate-ad."
      - "Generating or re-rendering the asset -> produce-asset; changing the brief -> brief-graphic."
    prerequisites:
      recommended:
        - "id:brand"
        - "id:design"
        - "id:icp-research"
        - "docs/forsvn/artifacts/marketing/produced-assets/[slug]/manifest.md"
      hard:
        - ".forsvn/loops/[slug]/program.md"
        - ".forsvn/loops/[slug]/context.md"
        - "docs/forsvn/artifacts/marketing/design-briefs/[slug].md"

  orchestration:
    default: auto
    single_when:
      - "Brief-fidelity check only (no render-quality / brand-fit diagnosis needed)."
    multi_when:
      - "Default — 4 agents (Metric Ingest + Diagnosis + Recommendation + Critic)."
      - "Brief-fidelity vs render-quality disputed; needs the full layer."
    critic_required_when:
      - "Always — eval artifact + ledger row are canonical loop state."
      - "Override protocol: critic FAIL twice -> BLOCKED, no ledger row."

  load:
    always:
      - "references/_shared/eval-loop-spec.md"
      - "references/_shared/evaluation-loop-rubric.md"
    when:
      - if: "Pre-Dispatch (Warm / Cold Start, hard-block checks)"
        read:
          - "references/procedures/pre-dispatch.md"
      - if: "Layer dispatch + critic revision cycle"
        read:
          - "references/agent-manifest.md"
          - "references/procedures/dispatch-mechanics.md"
      - if: "Rubric scoring"
        read:
          - "references/rubric.md"
      - if: "Artifact write / Evidence + Brief-Fidelity table format"
        read:
          - "references/format-conventions.md"
      - if: "Return-leg / execution-mode provenance"
        read:
          - "references/_shared/execution-fork.md"
      - if: "Critic override (operator ships despite FAIL)"
        read:
          - "references/_shared/critic-override-protocol.md"
      - if: "Quality feedback / dashboard updates"
        read:
          - "references/_shared/quality-dashboard-spec.md"
      - if: "Anti-pattern review"
        read:
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: ".forsvn/loops/[slug]/evals/YYYY-MM-DD-cycle-N.md"
        lifecycle: evaluation
        produced_when: "Critic PASS; one cycle = one asset/variant = one artifact + one ledger row."
      - path: ".forsvn/loops/[slug]/results.tsv"
        lifecycle: evaluation
        produced_when: "One row appended via `append-loop-result.ts` on critic PASS."
      - path: ".forsvn/loops/[slug]/learnings.md"
        lifecycle: evaluation
        produced_when: "ONLY for high-confidence keep/discard lessons that generalize beyond this exact render — critic gates promotion."
