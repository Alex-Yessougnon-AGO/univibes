# Routing + capability metadata for write-social.
# Source of truth — compiled into:
#   - hooks/skill-registry.json by `node hooks/build-registry.mjs`
#   - references/capability-index.json by `bun scripts/build-capability-index.ts`
# NOT loaded into model context. Edit here, then rebuild both.
promptSignals:
  phrases:
    - "write a tweet"
    - "write a linkedin post"
    - "tiktok caption"
    - "reels caption"
    - "shorts caption"
    - "social post"
    - "social copy"
    - "social media copy"
    - "hook variants"
    - "write a hook"
    - "post copy"
    - "caption for"
  allOf:
    - [write, post]
    - [write, caption]
    - [social, copy]
    - [social, media, copy]
  anyOf:
    - "tiktok"
    - "reels"
    - "shorts"
    - "linkedin post"
    - "tweet"
    - "x post"
    - "hook variant"
    - "social hook"
  noneOf:
    - "ad copy"
    - "email subject"
    - "newsletter"
    - "youtube video"
    - "blog post"
  minScore: 5

capability:
  id: write-social
  domain: marketing
  public: true
  command: /write-social
  summary: "Platform-native social copy (hook variants + body + CTA + format spec) for tiktok / reels / shorts / x / linkedin. Single-platform per artifact. 5-dim rubric."
  aliases:
    - social-copy
    - post-copy
    - social-hook

  route:
    use_when:
      - "User asks to write organic social copy or hook variants for ONE platform."
      - "User asks for platform-native short-form caption / post / thread copy."
    not_when:
      - "Paid Meta / Google / LinkedIn ad copy -> write-ad."
      - "Full short-form video brief with storyboard -> brief-shortform."
      - "Landing-page copy, headlines, taglines -> write-copy."
      - "LinkedIn articles, Substack, blog (long-form) -> write-copy or optimize-seo."
      - "Vietnamese-market polish -> polish-vn (terminal pass)."
      - "AI-pattern stripping post-generation -> humanmaxxing (terminal pass)."
    prerequisites:
      recommended:
        - "id:icp-research"
        - "id:product-context"
        - "docs/forsvn/artifacts/marketing/brief-shortform/[slug]/brief.md"
      hard:
        - "id:brand"

  orchestration:
    default: auto
    single_when:
      - "Single sequential graph (copywriter → format-checker → critic) is the design."
      - "--fast collapses format-check revision loop to ZERO (single-pass; hard-cap violation → FORMAT_FAIL immediately)."
    multi_when:
      - "Default — 3 agents (copywriter + format-checker + critic) per single-platform artifact."
      - "--deep bumps format-check revision loop to MAX 2 cycles."
    critic_required_when:
      - "Always — critic gate is single-pass on the 5-dim rubric."
      - "Discrimination test (weak brief MUST score <25; strong brief MUST score ≥35) runs every cycle."

  load:
    always:
      - "references/_shared/before-starting-check.md"
      - "references/_shared/mode-resolver.md"
      - "references/_shared/pre-dispatch-protocol.md"
    when:
      - if: "Pre-Dispatch (Cold Start, Write-back)"
        read:
          - "references/procedures/pre-dispatch.md"
      - if: "Layer dispatch (copywriter → format-checker → critic)"
        read:
          - "references/agent-manifest.md"
          - "references/procedures/dispatch-mechanics.md"
      - if: "Per-platform Hook Taxonomy + format constraints"
        read:
          - "references/_shared/platform-intelligence/"
      - if: "Critic scoring / format-check rules"
        read:
          - "references/rubric.md"
          - "references/format-conventions.md"
      - if: "Anti-pattern review"
        read:
          - "references/anti-patterns.md"
      - if: "Strong / weak examples"
        read:
          - "references/examples.md"

  outputs:
    artifacts:
      - path: "docs/forsvn/artifacts/marketing/copy/[platform]-[YYYY-MM-DD]-[slug].md"
        lifecycle: pipeline
        produced_when: "Critic PASS / DONE_WITH_CONCERNS / FAIL (FAIL artifacts ship with annotations per locked decision; NOT written on FORMAT_FAIL or NEEDS_CONTEXT)."
