# Routing + capability metadata for research-shortform.
promptSignals:
  phrases:
    - "what's working on tiktok"
    - "short-form trends"
    - "reels research"
    - "shorts research"
    - "tiktok patterns"
    - "viral hook research"
  allOf:
    - [short-form, research]
    - [tiktok, hook]
    - [reels, pattern]
  anyOf:
    - "trending sound"
    - "hook archetype"
    - "platform research"
    - "what's hitting"
  noneOf:
    - "long-form"
    - "youtube long"
    - "podcast"
    - "blog post"
  minScore: 6

capability:
  id: research-shortform
  domain: research
  public: true
  command: /research-shortform
  summary: "Discover what's working on short-form platforms — hook archetypes, trending audio, platform mechanics. Per-platform sourced catalog."
  aliases:
    - shortform-research
    - viral-hook-research
    - platform-trends

  route:
    use_when:
      - "Before briefing short-form content, find current viral patterns."
      - "Refresh stale platform intelligence (>30d trends or >180d mechanics)."
      - "Hook-archetype mining for a specific topic / market."
    not_when:
      - "Long-form video -> parked (out of scope)."
      - "Static visuals -> brief-graphic."
      - "Audience research -> research-icp."
      - "Campaign planning -> plan-campaign."
    prerequisites:
      recommended:
        - "id:icp-research"
      hard: []

  orchestration:
    default: auto
    single_when:
      - "Single-platform sweep; --fast forces single-pass."
    multi_when:
      - "Multi-platform sweep (TikTok + Reels + Shorts)."
    critic_required_when:
      - "Always — every claim sourced to a specific platform doc / third-party study / pattern-derived note."
      - "Stale-source flag (>30d for trends, >180d for mechanics)."

  load:
    always:
      - "references/_shared/before-starting-check.md"
    when:
      - if: "Pre-Dispatch"
        read:
          - "references/_shared/pre-dispatch-protocol.md"
      - if: "Per-platform clipping/live + confidence labeling"
        read:
          - "references/_shared/clipping-and-live.md"
          - "references/_shared/confidence-labeling.md"
      - if: "Anti-pattern review (fabricated trends, unsourced viral claims)"
        read:
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: "docs/forsvn/artifacts/research/research-shortform/[slug].md"
        lifecycle: snapshot
        produced_when: "Critic PASS; dated per-platform catalog."
