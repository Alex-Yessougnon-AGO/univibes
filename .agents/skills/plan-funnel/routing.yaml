# Routing + capability metadata for plan-funnel.
promptSignals:
  phrases:
    - "funnel model"
    - "model the funnel"
    - "unit economics"
    - "growth targets"
    - "ltv cac"
    - "revenue target"
    - "how much traffic do we need"
  allOf:
    - [funnel, model]
    - [growth, target]
  anyOf:
    - "ltv"
    - "cac"
    - "conversion rate"
    - "revenue target"
    - "traffic target"
    - "growth model"
    - "unit economics"
  noneOf:
    - "market size"
    - "competitor"
    - "what should we build"
    - "diagnose"
  minScore: 6

capability:
  id: plan-funnel
  domain: research
  public: true
  command: /plan-funnel
  summary: "Numeric funnel + unit-economics model — conversion rates, traffic targets, LTV/CAC, revenue targets, sensitivity bands. Drives downstream channel-mix + budget decisions."
  aliases:
    - funnel-model
    - unit-economics
    - growth-targets

  route:
    use_when:
      - "Need numeric funnel targets (traffic → leads → customers → revenue)."
      - "Unit economics modeling (LTV, CAC, payback, gross margin)."
      - "Sensitivity bands on a growth model."
    not_when:
      - "Market sizing / competitive landscape -> research-market."
      - "Diagnosing a metric decline -> diagnose."
      - "Force-ranking initiatives -> prioritize."
      - "Campaign / channel planning -> plan-campaign."
    prerequisites:
      recommended:
        - "id:market-research"
        - "id:product-context"
        - "id:diagnose"
      hard: []

  orchestration:
    default: auto
    single_when:
      - "Single-segment funnel; --fast forces single-pass."
    multi_when:
      - "Multi-segment / multi-channel funnel with cross-channel sensitivity."
    critic_required_when:
      - "Always — every rate has a source + sensitivity band; no opinion-only numbers."
      - "Math sanity-check (funnel multiplications consistent, LTV/CAC unit-aligned)."

  load:
    always:
      - "references/_shared/before-starting-check.md"
    when:
      - if: "Pre-Dispatch"
        read:
          - "references/_shared/pre-dispatch-protocol.md"
      - if: "Funnel models + unit economics"
        read:
          - "references/funnel-models.md"
          - "references/unit-economics.md"
      - if: "Industry benchmarks + stress tests"
        read:
          - "references/benchmarks.md"
          - "references/stress-tests.md"
      - if: "Anti-pattern review (unsourced rates, missing sensitivity)"
        read:
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: "docs/forsvn/artifacts/meta/records/targets-<slug>.md"
        lifecycle: snapshot
        produced_when: "Critic PASS; numeric funnel + sensitivity bands."
