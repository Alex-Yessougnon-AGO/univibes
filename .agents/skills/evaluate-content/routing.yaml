# Routing + capability metadata for evaluate-content.
# Source of truth — compiled into:
#   - hooks/skill-registry.json by `node hooks/build-registry.mjs`
#   - references/capability-index.json by `bun scripts/build-capability-index.ts`
# NOT loaded into model context. Edit here, then rebuild both.
promptSignals:
  phrases:
    - "content eval"
    - "evaluate content performance"
    - "evaluate the post"
    - "post performance"
    - "did the content work"
    - "engagement results"
    - "score this post"
    - "organic post results"
    - "content cycle results"
    - "save rate"
    - "did the carousel land"
    - "post-publish review"
  allOf:
    - [content, results]
    - [post, performance]
    - [engagement, score]
    - [content, not, working]
  anyOf:
    - "engagement rate"
    - "save rate"
    - "share rate"
    - "click-through"
    - "dwell time"
    - "qualitative feedback"
    - "comments sentiment"
    - "did the post land"
  noneOf:
    - "new social copy"
    - "write a post"
    - "content brief"
    - "ad performance"
    - "short-form video"
  minScore: 6

capability:
  id: evaluate-content
  domain: marketing
  public: true
  command: /evaluate-content
  summary: "Score a published organic post (text / image / carousel) from real metrics inside an existing eval loop — one primary platform per cycle, verdict + engagement-quality diagnosis."
  aliases:
    - content-eval
    - post-eval
    - post-publish-review

  route:
    use_when:
      - "User asks to evaluate a published organic post (text / image / carousel) against its write-social brief's hypothesis."
      - "Loop exists; cycle N needs scoring for one primary platform."
    not_when:
      - "Loop does not exist yet -> run-pipeline."
      - "Short-form video -> evaluate-shortform."
      - "Paid-ad performance -> evaluate-ad."
      - "Writing next-cycle copy -> write-social."
    prerequisites:
      recommended:
        - "id:brand"
        - "id:icp-research"
        - "id:product-context"
        - "docs/forsvn/artifacts/marketing/published-social/[slug]/manifest.md"
      hard:
        - ".forsvn/loops/[slug]/program.md"
        - ".forsvn/loops/[slug]/context.md"
        - "docs/forsvn/artifacts/marketing/copy/[platform]-[date]-[slug].md"

  orchestration:
    default: auto
    single_when:
      - "Metric ingest only (no engagement-quality diagnosis needed)."
    multi_when:
      - "Default — 4 agents (Metric Ingest + Diagnosis + Recommendation + Critic)."
      - "Engagement-quality or cross-platform signal disputed; needs the full layer."
    critic_required_when:
      - "Always — eval artifact + ledger row are canonical loop state."
      - "Override protocol: critic FAIL twice -> BLOCKED, no ledger row."

  load:
    always:
      - "references/_shared/eval-loop-spec.md"
      - "references/_shared/evaluation-loop-rubric.md"
    when:
      - if: "Pre-Dispatch (Warm / Cold Start, hard-block checks)"
        read:
          - "references/procedures/pre-dispatch.md"
      - if: "Layer dispatch + critic revision cycle"
        read:
          - "references/agent-manifest.md"
          - "references/procedures/dispatch-mechanics.md"
      - if: "Rubric scoring"
        read:
          - "references/rubric.md"
      - if: "Artifact write / Evidence + Engagement-Quality table format"
        read:
          - "references/format-conventions.md"
      - if: "Critic override (operator ships despite FAIL)"
        read:
          - "references/_shared/critic-override-protocol.md"
      - if: "Quality feedback / dashboard updates"
        read:
          - "references/_shared/quality-dashboard-spec.md"
      - if: "Anti-pattern review"
        read:
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: ".forsvn/loops/[slug]/evals/YYYY-MM-DD-cycle-N.md"
        lifecycle: evaluation
        produced_when: "Critic PASS; one cycle = one primary platform = one artifact + one ledger row."
      - path: ".forsvn/loops/[slug]/results.tsv"
        lifecycle: evaluation
        produced_when: "One row appended via `append-loop-result.ts` on critic PASS."
      - path: ".forsvn/loops/[slug]/learnings.md"
        lifecycle: evaluation
        produced_when: "ONLY for high-confidence keep/discard lessons that generalize beyond this exact content — critic gates promotion."
