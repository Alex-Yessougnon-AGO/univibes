# Routing + capability metadata for brief-shortform.
# Source of truth — compiled into:
#   - hooks/skill-registry.json by `node hooks/build-registry.mjs`
#   - references/capability-index.json by `bun scripts/build-capability-index.ts`
# NOT loaded into model context. Edit here, then rebuild both.
promptSignals:
  phrases:
    - "short-form brief"
    - "tiktok brief"
    - "reels brief"
    - "shorts brief"
    - "video brief"
    - "shoot brief"
    - "storyboard"
  allOf:
    - [short-form, brief]
    - [tiktok, plan]
    - [reels, brief]
  anyOf:
    - "shot list"
    - "hook variations"
    - "video script"
    - "production brief"
  noneOf:
    - "blog post"
    - "newsletter"
    - "long-form"
    - "podcast"
    - "evaluate"
  minScore: 6

capability:
  id: brief-shortform
  domain: marketing
  public: true
  command: /brief-shortform
  summary: "Production-ready short-form video brief — hook, shot list, on-screen text, audio plan, caption, CTA, aspect, length. 1 hero + 2 variants per run. Live-action + motion-graphic."
  aliases:
    - shortform-brief
    - video-brief
    - storyboard
    - shoot-brief

  route:
    use_when:
      - "User asks to turn a video angle / topic into a shootable brief."
      - "Short-form video (TikTok / Reels / Shorts / X / LinkedIn) needs production spec."
      - "1 hero + per-platform variants requested."
    not_when:
      - "Static visual asset -> brief-graphic."
      - "Organic social copy without video -> write-social."
      - "Paid ad creative -> write-ad."
      - "Long-form video (>60s) -> out of scope."
      - "Rendering / scaffolds -> produce-video."
    prerequisites:
      recommended:
        - "docs/forsvn/artifacts/research/research-shortform/[slug].md"
        - "id:icp-research"
        - "id:brand"
        - "docs/forsvn/artifacts/marketing/campaign-plan.md"
      hard: []

  orchestration:
    default: multi
    single_when:
      - "--fast collapses to Layer 1 + 1.5 single-pass via single-agent fallback (skips Layer 2 — no critic, no platform-tailor)."
    multi_when:
      - "Default — 9 agents (Layer 1 parallel + Layer 1.5 parallel + Layer 2 sequential)."
      - "Multi-platform invocation adds `platform-tailor-agent` for TRUE RECUT variants."
    critic_required_when:
      - "Always — 4-sub-critic gate (Hook / Production / Algorithm-fit / Brand-fit); all 4 PASS required; max 2 rewrite cycles."
      - "Variants are TRUE RECUTS, not caption-resizes — orchestrator rejects caption-only resizing."

  load:
    always:
      - "references/_shared/before-starting-check.md"
      - "references/_shared/pre-dispatch-protocol.md"
      - "references/_shared/mode-resolver.md"
    when:
      - if: "Pre-Dispatch (Warm / Cold Start, VN auto-routing for polish chain)"
        read:
          - "references/procedures/pre-dispatch.md"
      - if: "Layer dispatch + spawn mechanics + critic routing"
        read:
          - "references/agent-manifest.md"
          - "references/procedures/dispatch-mechanics.md"
      - if: "Hook archetypes by platform"
        read:
          - "references/hook-archetypes.md"
      - if: "Storyboard grammar (shot/scene list, timing, framing)"
        read:
          - "references/storyboard-grammar.md"
      - if: "Caption + CTA + hashtag rules"
        read:
          - "references/caption-cta-rules.md"
      - if: "Live-action vs motion-graphic production modes"
        read:
          - "references/production-modes.md"
      - if: "Platform intelligence (format / algorithm / mechanics)"
        read:
          - "references/_shared/platform-intelligence/"
      - if: "Polish chain (vn-tone | humanmaxxing | none)"
        read:
          - "references/polish-chain.md"
      - if: "Anti-pattern review"
        read:
          - "references/anti-patterns.md"

  outputs:
    artifacts:
      - path: "docs/forsvn/artifacts/marketing/brief-shortform/[slug]/brief.md"
        lifecycle: pipeline
        produced_when: "Hero brief — Layer 2 critic PASS / DONE_WITH_CONCERNS."
      - path: "docs/forsvn/artifacts/marketing/brief-shortform/[slug]/variants/[platform].md"
        lifecycle: pipeline
        produced_when: "Per-platform variant (TRUE RECUT) emitted by platform-tailor-agent."
