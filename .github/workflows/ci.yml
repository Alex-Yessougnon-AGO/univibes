name: CI

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

jobs:
  api:
    name: API (lint + test + build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: univibes_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: univibes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://univibes_test:test_password@localhost:5432/univibes_test
      JWT_ACCESS_SECRET: ci_test_access_secret_long_enough_32c
      JWT_REFRESH_SECRET: ci_test_refresh_secret_long_enough_32c
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      - run: pnpm db:migrate:deploy

      - run: pnpm --filter api lint

      - run: pnpm --filter api test

      - run: pnpm --filter api build

  web:
    name: Web (build)
    runs-on: ubuntu-latest
    needs: [] # parallel with api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
