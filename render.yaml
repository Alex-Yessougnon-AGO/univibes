# =========================================
# Univibes API — Render Blueprint
# pnpm monorepo → Docker → PostgreSQL
# =========================================

services:
  - type: web
    name: univibes-api
    runtime: docker
    repo: https://github.com/Alex-Yessougnon-AGO/univibes
    branch: main
    dockerfilePath: Dockerfile
    healthCheckPath: /api/v1/health
    preDeployCommand: ./node_modules/.bin/prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: univibes-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: QR_CODE_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: "15m"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "30d"
      - key: APP_URL
        value: https://univibes-api.onrender.com
      - key: FRONTEND_URL
        value: https://univibes.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@univibes.com
      - key: EMAIL_FROM_NAME
        value: Univibes
      - key: FEDAPAY_API_KEY
        sync: false
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: FEDAPAY_WEBHOOK_SECRET
        sync: false
      - key: FEDAPAY_SANDBOX
        value: "true"
      - key: SENTRY_DSN
        sync: false

databases:
  - name: univibes-db
    databaseName: univibes
    plan: free
    postgresMajorVersion: 16
